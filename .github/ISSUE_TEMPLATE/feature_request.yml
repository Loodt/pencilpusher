name: Feature request
description: Suggest a new capability or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the real-world workflow this would unblock. Pain points are more useful than proposed solutions.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution (optional)
      description: How you'd imagine pencilpusher handling this. Skip if you don't have one in mind.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other tools or workarounds you've tried.

  - type: textarea
    id: examples
    attributes:
      label: Example documents or forms
      description: If safe to share, link or attach example forms (anonymised) that this feature would help with.
